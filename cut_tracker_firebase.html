let allEntries={};   // { docId: {user,date,weight,kcal,protein,trained,notes} }
let unsub=null;

const LS = { name:'cut_userName', group:'cut_groupCode' };

function todayDay(){ return ['dimanche','lundi','mardi','mercredi','jeudi','vendredi','samedi'][new Date().getDay()]; }

// ─── INIT ─────────────────────────────────────────────────────────────────────
function init(){
  currentDay = todayDay();
  currentTab = (DAY_TYPES[currentDay]==='muscu'||DAY_TYPES[currentDay]==='cardio') ? 'training' : 'nutrition';
  userName = localStorage.getItem(LS.name);
  groupCode = localStorage.getItem(LS.group);
  updateSyncStatus();
  buildDaySelector();
  renderPlan();
  if (userName && groupCode && db) subscribe();
}

function updateSyncStatus(){
  const el = document.getElementById('sync-status');
  if (!CONFIG_OK) { el.innerHTML = '<span class="sync-pill sync-off">⚠️ Config Firebase manquante</span>'; return; }
  if (userName && groupCode) { el.innerHTML = `<span class="sync-pill sync-on">🟢 Synchro active · groupe « ${groupCode} » · ${userName}</span>`; }
  else { el.innerHTML = '<span class="sync-pill sync-off">🔵 Rejoins un groupe dans l\'onglet « Notre Suivi »</span>'; }
}

function setMainTab(t){
  mainTab=t;
  document.getElementById('mt-plan').className='maintab'+(t==='plan'?' active':'');
  document.getElementById('mt-track').className='maintab'+(t==='track'?' active':'');
  document.getElementById('view-plan').style.display=(t==='plan')?'block':'none';
  document.getElementById('view-track').style.display=(t==='track')?'block':'none';
  if(t==='track') renderTracker();
}

function buildDaySelector(){
  const c=document.getElementById('days-inner'); c.innerHTML='';
  DAYS.forEach(d=>{
    const ac=TYPE_ACCENT[DAY_TYPES[d]], isA=d===currentDay;
    const b=document.createElement('button'); b.className='day-btn';
    b.style.cssText=`border-color:${isA?ac:'transparent'};background:${isA?ac+'18':'#1e293b'};color:${isA?ac:'#64748b'}`;
    b.innerHTML=`${DAY_LABELS[d]}<div class="day-dot" style="background:${ac};opacity:${isA?1:.4}"></div>`;
    b.onclick=()=>{currentDay=d;currentTab=(DAY_TYPES[d]==='repos')?'nutrition':'training';buildDaySelector();renderPlan();};
    c.appendChild(b);
  });
}

// ─── RENDER PLAN ──────────────────────────────────────────────────────────────
function renderPlan(){
  const type=DAY_TYPES[currentDay], accent=TYPE_ACCENT[type];
  const isMuscu=type==='muscu', isCardio=type==='cardio';
  const nut=NUTRITION[type]; let html='';
  html+=`<div class="day-header" style="background:linear-gradient(135deg,#0f172a,#1a1a2e);border-color:${accent}25">
    <div class="day-header-row"><div><h2>${currentDay.toUpperCase()}</h2>
    <span class="day-badge" style="background:${accent}20;border:1px solid ${accent}40;color:${accent}">${DAY_BADGES[currentDay]}</span></div>
    <div class="cal-box"><div class="cal-label">CALORIES</div><div class="cal-value">${DAY_CAL[currentDay]}</div><div class="cal-unit">kcal/j</div></div></div>`;
  if(isCardio) html+=`<div class="day-note">Cardio + marche inclinée. Brûle le gras sans entamer la récup musculaire.</div>`;
  if(type==='repos') html+=`<div class="day-note">Repos complet. Marche libre + étirements. Dors 8h.</div>`;
  html+=`</div>`;

  if(isMuscu||isCardio){
    const l1 = isCardio?'🏃 SÉANCE':'🏋️ ENTRAÎNEMENT';
    html+=`<div class="tabs">
      <button class="tab-btn" onclick="setTab('training')" style="background:${currentTab==='training'?accent:'#1e293b'};color:${currentTab==='training'?'#0a0a0f':'#64748b'}">${l1}</button>
      <button class="tab-btn" onclick="setTab('nutrition')" style="background:${currentTab==='nutrition'?accent:'#1e293b'};color:${currentTab==='nutrition'?'#0a0a0f':'#64748b'}">🍽️ NUTRITION</button>
    </div>`;
  }

  if(currentTab==='training'&&isMuscu){
    const tr=TRAINING[currentDay];
    html+=`<div style="background:#0f172a;border:1px solid #1e293b;border-radius:10px;padding:10px 14px;margin-bottom:14px"><span style="font-size:13px;font-weight:800;color:${accent}">${tr.title}</span></div>`;
    tr.sections.forEach(sec=>{
      html+=`<div class="section-block"><div class="section-header" style="background:${sec.color}15;border:1px solid ${sec.color}30"><span class="section-name" style="color:${sec.color}">${sec.name}</span></div>`;
      sec.exercises.forEach(ex=>{
        html+=`<div class="exercise"><div class="ex-row"><div class="ex-left">
          <div class="ex-meta"><span class="ex-num" style="background:${sec.color}">${ex.num}</span><span class="ex-name">${ex.name}</span></div>
          <div class="ex-tip">💡 ${ex.tip}</div></div>
          <div class="ex-right"><div class="ex-sets" style="color:${sec.color}">${ex.sets}</div><div class="ex-rest">${ex.rest}</div></div></div></div>`;
      });
      html+=`</div>`;
    });
  }
  if(currentTab==='training'&&isCardio){
    html+=`<div class="cardio-card">`;
    CARDIO[currentDay].steps.forEach(s=>{ html+=`<div class="cardio-step"><div class="cardio-icon">${s.icon}</div><div><div class="cardio-title">${s.title}</div><div class="cardio-desc">${s.desc}</div></div></div>`; });
    html+=`</div>`;
  }
  if(currentTab==='nutrition'||type==='repos'){
    html+=`<div class="meals-card">`;
    nut.meals.forEach(m=>{ html+=`<div class="meal-row"><div class="meal-icon">${m.icon}</div><div class="meal-content">
      <div class="meal-top"><span class="meal-name">${m.name}</span><span class="meal-time">${m.time}</span></div>
      ${m.items.map(it=>`<div class="meal-item">• ${it}</div>`).join('')}
      <span class="meal-macros">${m.macros}</span></div></div>`; });
    html+=`</div><div class="total-bar"><span class="total-label">TOTAL DU JOUR</span><span class="total-value">${nut.total}</span></div>`;
    html+=`<div class="tip-box"><div class="tip-label">💡 CONSEIL DU JOUR</div><div class="tip-text">${nut.tip}</div></div>`;
  }
  document.getElementById('plan-content').innerHTML=html;
}
function setTab(t){currentTab=t;renderPlan();}

// ─── FIRESTORE SYNC ───────────────────────────────────────────────────────────
function subscribe(){
  if(!db||!groupCode) return;
  if(unsub) unsub();
  const col = collection(db,'groups',groupCode,'entries');
  unsub = onSnapshot(col, snap=>{
    allEntries={};
    snap.forEach(d=> allEntries[d.id]=d.data());
    if(mainTab==='track') renderTracker();
  }, err=>{ console.error(err); });
}

function joinGroup(){
  const n=document.getElementById('j-name').value.trim();
  const g=document.getElementById('j-group').value.trim().toLowerCase();
  if(!n||!g){ alert('Renseigne ton prénom ET un code de groupe.'); return; }
  userName=n; groupCode=g;
  localStorage.setItem(LS.name,n); localStorage.setItem(LS.group,g);
  updateSyncStatus(); subscribe(); renderTracker();
}

function leaveGroup(){
  if(!confirm('Quitter le groupe sur cet appareil ? (tes données restent dans le cloud)')) return;
  if(unsub) unsub();
  userName=null; groupCode=null; allEntries={};
  localStorage.removeItem(LS.name); localStorage.removeItem(LS.group);
  updateSyncStatus(); renderTracker();
}

async function saveLog(){
  if(!db||!groupCode){ alert('Synchro non configurée.'); return; }
  const date=document.getElementById('in-date').value;
  if(!date){ msg('⚠️ Choisis une date','#ef4444'); return; }
  const entry={
    user:userName, date,
    weight:parseFloat(document.getElementById('in-weight').value)||null,
    kcal:parseInt(document.getElementById('in-kcal').value)||null,
    protein:parseInt(document.getElementById('in-protein').value)||null,
    trained:document.getElementById('in-trained').checked,
    notes:document.getElementById('in-notes').value.trim(),
    updatedAt:serverTimestamp()
  };
  const id=`${userName}__${date}`;
  try{
    await setDoc(doc(db,'groups',groupCode,'entries',id),entry);
    msg('✅ Enregistré et synchronisé !','#22c55e');
  }catch(e){ console.error(e); msg('❌ Erreur de synchro — vérifie ta connexion','#ef4444'); }
}

async function deleteLog(id){
  if(!db||!groupCode) return;
  try{ await deleteDoc(doc(db,'groups',groupCode,'entries',id)); }catch(e){ console.error(e); }
}

function msg(txt,color){
  const el=document.getElementById('save-msg'); if(!el) return;
  el.textContent=txt; el.style.color=color; setTimeout(()=>{el.textContent='';},2600);
}

// ─── RENDER TRACKER ───────────────────────────────────────────────────────────
function renderTracker(){
  const c=document.getElementById('track-content');

  if(!CONFIG_OK){
    c.innerHTML=`<div class="config-warn"><h3>⚠️ Configuration Firebase requise</h3>
      <p>Pour activer la synchro partagée, ouvre ce fichier dans un éditeur de texte et colle ta config Firebase dans le bloc <code>firebaseConfig</code> en haut du script.<br><br>
      Suis les étapes que je t'ai données pour créer ton projet Firebase gratuit, puis remplace les <code>"COLLE_ICI"</code> par tes vraies valeurs.</p></div>`;
    return;
  }

  if(!userName||!groupCode){
    c.innerHTML=`
      <div class="join-card">
        <h3>👥 Rejoindre votre groupe</h3>
        <div class="sub">Toi et ton ami entrez le <strong>même code de groupe</strong> (inventez-en un, ex : « teamjuin »). Vous verrez alors vos deux progressions synchronisées en temps réel.</div>
        <div class="field"><label>Ton prénom</label><input id="j-name" placeholder="Ex : Diogo" /></div>
        <div class="field"><label>Code du groupe (le même pour vous deux)</label><input id="j-group" placeholder="Ex : teamjuin" /></div>
        <button class="save-btn" onclick="joinGroup()">🚀 REJOINDRE</button>
      </div>`;
    return;
  }

  // grouped by user
  const byUser={};
  Object.entries(allEntries).forEach(([id,e])=>{ (byUser[e.user]=byUser[e.user]||[]).push({id,...e}); });
  const users=Object.keys(byUser).sort((a,b)=> a===userName?-1:b===userName?1:a.localeCompare(b));

  let html=`<div class="info-banner"><div class="info-banner-text">🟢 Synchro active sur le groupe « ${groupCode} ». Tout ce que vous saisissez apparaît instantanément chez l'autre. Regarde la tendance sur la semaine, pas le poids du jour.</div></div>`;

  // SAISIE
  const today=new Date().toISOString().slice(0,10);
  html+=`<div class="tracker-card"><h3>✍️ Ma saisie du jour</h3><div class="sub">Connecté en tant que <strong>${userName}</strong></div>
    <div class="field"><label>Date</label><input type="date" id="in-date" value="${today}"></div>
    <div class="field-row">
      <div class="field"><label>Poids (kg)</label><input type="number" step="0.1" id="in-weight" inputmode="decimal" placeholder="82.0"></div>
      <div class="field"><label>Calories</label><input type="number" id="in-kcal" inputmode="numeric" placeholder="1700"></div>
    </div>
    <div class="field"><label>Protéines (g)</label><input type="number" id="in-protein" inputmode="numeric" placeholder="200"></div>
    <label class="checkbox-field"><input type="checkbox" id="in-trained"><span>✅ Séance / cardio fait aujourd'hui</span></label>
    <div class="field"><label>Notes</label><textarea id="in-notes" rows="2" placeholder="Énergie, sommeil, ressenti…"></textarea></div>
    <button class="save-btn" onclick="saveLog()">💾 ENREGISTRER & SYNCHRONISER</button>
    <div class="save-msg" id="save-msg"></div>
    <div class="leave-link" onclick="leaveGroup()">Quitter le groupe sur cet appareil</div>
  </div>`;

  // MEMBERS
  if(!users.length){
    html+=`<div class="tracker-card"><div class="empty">Aucune donnée encore. Saisis ta première journée 👆</div></div>`;
  }
  users.forEach(u=>{
    const logs=byUser[u].sort((a,b)=>a.date.localeCompare(b.date));
    const weights=logs.filter(l=>l.weight!=null);
    let latestW='—',deltaW='—',avgK='—';
    if(weights.length){
      latestW=weights[weights.length-1].weight.toFixed(1);
      if(weights.length>1){ const d=weights[weights.length-1].weight-weights[0].weight; deltaW=(d>0?'+':'')+d.toFixed(1); }
    }
    const last7=logs.slice(-7).filter(l=>l.kcal!=null);
    if(last7.length) avgK=Math.round(last7.reduce((s,l)=>s+l.kcal,0)/last7.length);
    const dColor=(deltaW!=='—'&&parseFloat(deltaW)<0)?'#22c55e':(deltaW!=='—'&&parseFloat(deltaW)>0?'#ef4444':'#94a3b8');
    const isMe=u===userName;

    html+=`<div class="tracker-card member-block">
      <div class="member-head"><div class="member-name" style="color:${isMe?'#ef4444':'#06b6d4'}">${u}${isMe?'<span class="member-me">TOI</span>':''}</div></div>
      <div class="stats-grid">
        <div class="stat-card"><div class="stat-label">POIDS</div><div class="stat-value" style="color:#f59e0b">${latestW}</div><div class="stat-unit">kg</div></div>
        <div class="stat-card"><div class="stat-label">ÉVOLUTION</div><div class="stat-value" style="color:${dColor}">${deltaW}</div><div class="stat-unit">kg</div></div>
        <div class="stat-card"><div class="stat-label">MOY KCAL 7j</div><div class="stat-value" style="color:#06b6d4">${avgK}</div><div class="stat-unit">kcal</div></div>
      </div>`;
    logs.slice().reverse().forEach(l=>{
      const df=new Date(l.date+'T00:00').toLocaleDateString('fr-FR',{day:'2-digit',month:'short'});
      let parts=[];
      if(l.weight!=null)parts.push(`<b>${l.weight}</b>kg`);
      if(l.kcal!=null)parts.push(`<b>${l.kcal}</b>kcal`);
      if(l.protein!=null)parts.push(`<b>${l.protein}</b>g P`);
      if(l.trained)parts.push('✅');
      html+=`<div class="log-row"><span class="log-date">${df}</span><span class="log-data">${parts.join(' · ')||'—'}${l.notes?'<br><span style="color:#475569">'+l.notes+'</span>':''}</span>${isMe?`<span class="log-del" onclick="deleteLog('${l.id}')">🗑️</span>`:''}</div>`;
    });
    html+=`</div>`;
  });

  c.innerHTML=html;
}

// expose to window for inline onclick
window.setMainTab=setMainTab; window.setTab=setTab; window.joinGroup=joinGroup;
window.leaveGroup=leaveGroup; window.saveLog=saveLog; window.deleteLog=deleteLog;

init();
</script>
</body>
</html>
